version: "3.8"

services:
  postgres-test:
    image: postgres:16
    container_name: gac-api-test-db
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: gac_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d gac_test"]
      interval: 5s
      timeout: 5s
      retries: 5
