name: Quality Checks

on:
  push:
    branches: ["develop", "master"]
  pull_request:
    branches: ["develop", "master"]

permissions:
  contents: read

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DB_HOST: "localhost"
      DB_PORT: "5432"
      DB_USER: "test"
      DB_PASSWORD: "test"
      DB_NAME: "test"
      DB_SCHEME: "gac"
      JWT_SECRET: "test-jwt-secret-key-for-ci-minimum-32-chars"
      JWT_ALGORITHM: "HS256"
      PASETO_SECRET_KEY: "dGVzdC1wYXNldG8tc2VjcmV0LWtleS0zMmJ5dGVz"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install pytest-cov ruff black

      - name: Check code formatting (Black)
        run: black --check app/ tests/

      - name: Lint code (Ruff)
        run: ruff check app/ tests/

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=55 -q

      - name: Build Docker image
        run: docker build -t gac-api:ci .

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-gac-api
          fail_ci_if_error: false
        continue-on-error: true
